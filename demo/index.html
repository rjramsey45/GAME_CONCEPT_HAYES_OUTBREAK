<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayes Outbreak Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="hud">
    <div><strong>Hayes Outbreak Demo</strong> (GTA-style zombie sandbox)</div>
    <div style="margin: 10px 0; font-size: 18px; font-weight: 700; color: gold;">Points: <span id="points">0</span></div>

    <div id="healthBar" class="bar">
      <div id="healthFill"></div>
      <span id="healthText">100%</span>
    </div>
    <div style="margin-top: 6px; font-size: 12px; opacity: 0.85;">Armor: <span id="armor">0</span> (Zaaadrink: 1500 pts)</div>

    <div id="pickupHint" class="tip"></div>
    <div class="tip">WASD move • Mouse aim • Click shoot • E interact • R reload • Shift sprint • M toggles minimap size</div>
  </div>

  <canvas id="game" width="1280" height="720"></canvas>
  <canvas id="minimap" class="minimap-small" width="220" height="170"></canvas>

  <div id="shopPanel" class="panel hidden">
    <h3>Safehouse Upgrade Terminal</h3>
    <button data-buy="medkit">Medkit (90 pts)</button>
    <button data-buy="zaaadrink">Zaaadrink (1500 pts)</button>
    <button data-buy="pistol">Pistol Damage +20% (140 pts)</button>
    <button data-buy="carArmor">Car Armor +30% (260 pts)</button>
    <button data-buy="carSpeed">Car Top Speed +20% (240 pts)</button>
  </div>

  <div id="missionPanel" class="panel hidden">
    <h3>Mission Board</h3>
    <button data-mission="rescue">Rescue Survivors</button>
    <button data-mission="heist">Pharmacy Heist</button>
    <button data-mission="horde">Horde Defense</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
