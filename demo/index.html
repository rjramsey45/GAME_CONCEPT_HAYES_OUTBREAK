<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayes Outbreak Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="hud">
    <div><strong>Hayes Outbreak Demo</strong> (GTA-style zombie sandbox)</div>
    <div>Health: <span id="health">100</span> | Armor: <span id="armor">0</span> | Points: <span id="points">0</span></div>
    <div>Weapon: <span id="weapon">Pistol</span> | Ammo: <span id="ammo">∞</span> | Threat: <span id="threat">1</span></div>
    <div>District: <span id="district">University Core</span> | Car: <span id="car">On Foot</span></div>
    <div class="tip">WASD move • Mouse aim • Click shoot • E enter/exit car • F interact shop • R reload • Shift sprint</div>
  </div>

  <canvas id="game" width="1280" height="720"></canvas>

  <div id="shopPanel" class="panel hidden">
    <h3>Safehouse Upgrade Terminal</h3>
    <button data-buy="armor">+25 Armor (120 pts)</button>
    <button data-buy="pistol">Pistol Damage +20% (140 pts)</button>
    <button data-buy="smg">Unlock SMG (220 pts)</button>
    <button data-buy="rifle">Unlock Rifle (320 pts)</button>
    <button data-buy="carArmor">Car Armor +30% (260 pts)</button>
    <button data-buy="carSpeed">Car Top Speed +20% (240 pts)</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
